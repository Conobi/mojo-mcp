version: "0.26.2"

gotchas:
  - id: variant-loop-hang
    title: "Variant in loop causes extreme compile slowdown"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: "for\\s+.+\\n[\\s\\S]*?Variant"
    error_pattern: null
    timeout_pattern: true
    description: "Using Variant inside a for loop causes the compiler to hang or take extremely long. Use struct-of-arrays dispatch instead."
    fix: "Replace Variant dispatch in loops with a tag enum + separate arrays per type."
    link: null

  - id: no-module-level-mutable
    title: "No module-level mutable variables"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "^var\\s+\\w+"
    error_pattern: "module-level variable .+ must be declared as"
    timeout_pattern: false
    description: "Mojo does not support mutable module-level variables."
    fix: "Use `alias` for compile-time constants, or wrap in a struct with `__init__`."
    link: null

  - id: string-indexing
    title: "String indexing unsupported"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\w+\\[\\d+\\]"
    error_pattern: "does not implement .+__getitem__"
    timeout_pattern: false
    description: "String indexing with [] is not supported in Mojo. Use .as_bytes() to access individual characters."
    fix: "Replace `s[i]` with `s.as_bytes()[i]`."
    link: null

  - id: variant-reference-not-copy
    title: "Variant returns references, not copies"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bget\\[.+\\]\\(\\)"
    error_pattern: null
    timeout_pattern: false
    description: "Variant.get[T]() returns a reference, not a copy. Using the value after the Variant is modified leads to undefined behavior."
    fix: "Use `.copy()` immediately after `.get[T]()` for owned binds."
    link: null

  - id: inline-array-init
    title: "InlineArray requires all N slots initialized"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "InlineArray\\["
    error_pattern: "must be initialized"
    timeout_pattern: false
    description: "InlineArray[T, N] requires all N slots to be initialized at construction. Partial initialization is not allowed."
    fix: "Initialize all slots explicitly, or use a factory function that fills all N values."
    link: null

  - id: no-match-enum
    title: "No match/enum support"
    severity: info
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bmatch\\s+"
    error_pattern: "unexpected token 'match'"
    timeout_pattern: false
    description: "Mojo does not have match/enum support yet (deferred beyond 1.0). Use if/elif chains or Variant."
    fix: "Use if/elif chains with isa[] checks, or a struct-based tag dispatch pattern."
    link: null

  - id: dtypepointer-deprecated
    title: "DTypePointer deprecated in favor of UnsafePointer"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bDTypePointer\\b"
    error_pattern: "DTypePointer.+deprecated"
    timeout_pattern: false
    description: "DTypePointer is deprecated since Mojo 25.4. Use UnsafePointer instead."
    fix: "Replace `DTypePointer[dtype]` with `UnsafePointer[Scalar[dtype]]`."
    link: null

  - id: slow-compilation-hint
    title: "Large file may cause slow compilation"
    severity: info
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: null
    timeout_pattern: true
    description: "Mojo compilation can take 60-90s for complex files. Consider precompiling stable code into .mojopkg."
    fix: "Split stable code into a package: `mojo package mylib/ -o mylib.mojopkg`, then import it."
    link: null

  - id: moveinit-copyinit-renamed
    title: "__moveinit__ and __copyinit__ renamed to __init__ with keyword args"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "\\bdef __(?:moveinit|copyinit)__\\b"
    error_pattern: null
    timeout_pattern: false
    description: "Since Mojo 0.26.2, __moveinit__() and __copyinit__() are renamed to __init__() with keyword-only `take` and `copy` arguments respectively. The legacy names still work but should be migrated."
    fix: "Replace `def __moveinit__(out self, *, take existing: Self)` with `def __init__(out self, *, take: Self)`. Replace `def __copyinit__(out self, *, copy existing: Self)` with `def __init__(out self, *, copy: Self)`."
    link: null

  - id: for-loop-reference
    title: "For loop variable is a reference, not a copy"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "for\\s+\\w+\\s+in\\s+(?!range\\s*\\()"
    error_pattern: null
    timeout_pattern: false
    description: "In Mojo, `for x in collection` binds x as a reference. Modifying the collection during iteration is undefined behavior."
    fix: "If you need to modify elements, use index-based iteration. If you need a copy, explicitly copy: `var local = x[].copy()`."
    link: null

  - id: integer-overflow-ub
    title: "Integer overflow is undefined behavior"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "integer overflow"
    timeout_pattern: false
    description: "Mojo integer overflow is undefined behavior with no runtime check by default. This can cause silent corruption."
    fix: "Use checked arithmetic or enable overflow checks with `-D ASSERT=all` during development."
    link: null

  - id: fn-deprecated
    title: "'fn' is deprecated — use 'def' instead"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "^fn\\s+"
    error_pattern: "deprecated.*\\bfn\\b"
    timeout_pattern: false
    description: "Since Mojo 0.26.2, `def` is the standard function declaration keyword. `fn` is deprecated and will be removed. `def` now has the same semantics as `fn` (non-raising by default, explicit `raises` required)."
    fix: "Replace `fn` with `def`. Add `raises` explicitly if the function can raise."
    link: null

  - id: owned-keyword-removed
    title: "'owned' keyword has been removed"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "\\bowned\\s+\\w+"
    error_pattern: "owned"
    timeout_pattern: false
    description: "The `owned` keyword has been removed in Mojo 0.26.2. Use `var` for parameters or `deinit` for __moveinit__/__del__ arguments."
    fix: "Replace `owned` with `var` (for general parameters) or `deinit` (for move/destroy arguments)."
    link: null

  - id: stringable-deprecated
    title: "Stringable and Representable deprecated — use Writable"
    severity: info
    mojo_versions: [">=0.26.2"]
    code_pattern: "\\b(?:Stringable|Representable)\\b"
    error_pattern: "(?:Stringable|Representable).+deprecated"
    timeout_pattern: false
    description: "Stringable and Representable traits are deprecated in Mojo 0.26.2. They are replaced by the unified Writable trait, which provides default implementations."
    fix: "Replace `Stringable` and `Representable` conformances with `Writable`."
    link: null

  - id: parameter-if-deprecated
    title: "@parameter if/for deprecated — use comptime if/for"
    severity: info
    mojo_versions: [">=0.26.2"]
    code_pattern: "@parameter\\s*\\n\\s*(?:if|for)\\s+"
    error_pattern: null
    timeout_pattern: false
    description: "The `@parameter if` and `@parameter for` syntax is deprecated in Mojo 0.26.2. Use `comptime if` and `comptime for` instead."
    fix: "Replace `@parameter\\nif condition:` with `comptime if condition:`. Replace `@parameter\\nfor i in range(N):` with `comptime for i in range(N):`."
    link: null

  - id: emoji-extension-removed
    title: ".🔥 and 📦 file extensions no longer supported"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: null
    error_pattern: "emoji.*extension|🔥|📦"
    timeout_pattern: false
    description: "The .🔥 (flame) and 📦 (package) emoji file extensions are no longer supported in Mojo 0.26.2. Use .mojo for source files and __init__.mojo for packages."
    fix: "Rename .🔥 files to .mojo and 📦 files to __init__.mojo."
    link: null

  - id: parallelize-heap-serializes
    title: "parallelize() serializes when work functions do heap allocation"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: "parallelize\\[.*\\]\\(.*\\)"
    error_pattern: null
    timeout_pattern: false
    description: "parallelize() achieves real multi-core speedup (3-4x) for compute-only closures, but shows 99% single-core usage when the work function does heap allocation (alloc, List append, struct construction). The Mojo runtime's memory allocator likely holds a global lock that serializes threads. Mojo's concurrency model is still in development — parallelize is 'not really a safe construct' for general-purpose concurrent code."
    fix: "For compute-only work (SIMD, math, reading from pre-allocated buffers): parallelize works well. For work that allocates memory: pre-allocate ALL memory before the parallel phase, or use os.process.Process for process-level isolation (each process gets its own allocator). Avoid allocating, cloning, or constructing structs inside @parameter closures passed to parallelize."
    link: "https://github.com/modular/modular/issues/1660"

  - id: unsafepointer-alloc-removed
    title: "UnsafePointer.alloc() static method does not exist"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "UnsafePointer\\[.+\\]\\.alloc\\("
    error_pattern: "has no member 'alloc'"
    timeout_pattern: false
    description: "UnsafePointer[T].alloc(N) does not exist in Mojo 0.26.2. The allocation free function must be imported from std.memory.unsafe_pointer."
    fix: "Use `from std.memory.unsafe_pointer import alloc` then `alloc[T](N)`. For FFI pointers, chain `.as_any_origin()` to get `UnsafePointer[T, MutAnyOrigin]`."
    link: null

  - id: unsafepointer-origin-required
    title: "UnsafePointer parameters need explicit MutAnyOrigin"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "UnsafePointer\\[\\w+\\](?!,)"
    error_pattern: "origin.*infer|cannot infer.*origin"
    timeout_pattern: false
    description: "Function parameters typed as bare `UnsafePointer[T]` fail origin inference in Mojo 0.26.2. The origin must be specified explicitly, especially in FFI wrapper methods."
    fix: "Replace `UnsafePointer[T]` with `UnsafePointer[T, MutAnyOrigin]` in function parameter signatures."
    link: null

  - id: list-variadic-construction
    title: "List variadic construction does not work"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "List\\[.+\\]\\(.+,.+\\)"
    error_pattern: null
    timeout_pattern: false
    description: "List[T](val1, val2, val3) variadic construction does not compile in Mojo 0.26.2. There is no variadic initializer for List."
    fix: "Create an empty list and append element by element, or allocate a heap buffer with `alloc[T](N)` and write elements via indexing."
    link: null

  - id: tuple-return-string
    title: "Tuple return types with String do not work"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "->\\s*\\(String"
    error_pattern: "Tuple.*String|cannot construct"
    timeout_pattern: false
    description: "Returning tuples containing String (e.g., `-> (String, String, String)`) does not compile in Mojo 0.26.2. Tuple construction with non-trivial types fails."
    fix: "Return a `List[String]` instead and access elements by index: `result[0]`, `result[1]`, etc."
    link: null

  - id: many-types-compile-hang
    title: "Compilation hangs when many distinct struct types are used in one file"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: null
    timeout_pattern: true
    description: "Mojo's compilation time scales super-linearly with the number of distinct struct types instantiated in one file. A file importing and using 8+ different struct types (each with methods like predict/update/reset) can cause the compiler to take 5+ minutes or appear to hang. This is due to LLVM code generation overhead from monomorphization of many generic types."
    fix: "Split large test/source files that use many different struct types into smaller files, each using 2-4 types. For test suites, create separate test files per module (test_ngram.mojo, test_match.mojo) instead of one monolithic file. Keep each .mojo file focused on a single module or 2-3 closely related types."
    link: null

  # -- 2026-05-11 audit additions (mined from session transcripts) --

  - id: implicitly-copyable-required
    title: "Type does not conform to ImplicitlyCopyable"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "value of type '[^']+' cannot be implicitly copied, it does not conform to 'ImplicitlyCopyable'"
    timeout_pattern: false
    description: "Mojo requires explicit ImplicitlyCopyable conformance for values that are copied implicitly (e.g. assignment, parameter passing without `^`). Many wrapper types (Error, Optional[Foo], custom structs) are Copyable but not ImplicitlyCopyable, so the compiler refuses to copy them silently."
    fix: "Add `ImplicitlyCopyable` to the struct's trait list (e.g. `struct Foo(Copyable, ImplicitlyCopyable, Movable):`), pass the value with `^` to transfer ownership, or wrap the access so the value is bound by reference instead of copied."
    link: null

  - id: raise-in-non-raising-context
    title: "Calling a raising function from a non-raising context"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "cannot call function that may raise in a context that cannot raise"
    timeout_pattern: false
    description: "A function declared without `raises` cannot call any function that may raise. In Mojo 0.26+, `def` is non-raising by default (same semantics as the old `fn`); only `def foo() raises:` or `fn foo() raises:` can propagate exceptions."
    fix: "Add `raises` to the calling function's signature (e.g. `def main() raises:`), wrap the raising call in `try:`/`except:`, or replace it with a non-raising alternative."
    link: null

  - id: expression-no-origin
    title: "Expression does not designate a value with an origin"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "expression does not designate a value with an origin"
    timeout_pattern: false
    description: "Returned values, temporaries, and computed expressions do not have a stable origin and cannot be borrowed by reference. This typically appears when indexing into a function return value (e.g. `make_pair()[0]`) or aliasing a temporary."
    fix: "Bind the expression to a named `var` first so it has a definite origin: `var pair = make_pair(); var first = pair[0]`. For tuple returns destructure into vars: `var (a, b) = make_pair()`."
    link: null

  - id: unqualified-struct-parameter
    title: "Unqualified access to struct parameter"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "unqualified access to struct parameter '[^']+'; use 'Self\\.[^']+' instead"
    timeout_pattern: false
    description: "Inside a struct method, type parameters of the enclosing struct must be referenced as `Self.parameter`, not bare. Mojo enforces this to disambiguate parameter access from local variable lookup."
    fix: "Prefix the parameter name with `Self.`: replace `min` with `Self.min`, `max` with `Self.max`, etc."
    link: null

  - id: main-in-package
    title: "`main` cannot be defined inside a package"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "defining 'main' within a package is not yet supported"
    timeout_pattern: false
    description: "Mojo refuses to compile any file containing `def main()` if that file lives inside a package directory (a directory containing `__init__.mojo`). This blocks the common pattern of writing test entry points alongside library modules."
    fix: "Move the file with `def main()` out of the package directory, or convert it into a top-level script. If you need to run tests for a package, place runner scripts in a separate non-package directory and import the test modules from there."
    link: null

  - id: failed-to-resolve-parent-package
    title: "Failed to resolve parent package body"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "failed to resolve parent package body"
    timeout_pattern: false
    description: "The Mojo compiler couldn't locate the parent package on the import path. This usually means the project root isn't on `-I` or the package directory is missing an `__init__.mojo`."
    fix: "Run with `mojo run -I . path/to/file.mojo` from the project root so Mojo can discover the package layout. Confirm every package directory contains an `__init__.mojo` (empty is fine)."
    link: null

  - id: global-vars-not-supported
    title: "Global vars are not supported"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "global vars are not supported"
    timeout_pattern: false
    description: "Mojo does not allow mutable globals. This error is the runtime-side complement of `module-level variable must be declared as alias` and fires for module-scope `var` declarations not caught by the earlier syntax check."
    fix: "Replace `var` at module scope with `alias` (for compile-time constants), wrap the state in a struct, or move the variable into `def main()`."
    link: null

  - id: unknown-declaration-str
    title: "`str()` builtin removed — use `String()`"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bstr\\s*\\("
    error_pattern: "use of unknown declaration 'str'"
    timeout_pattern: false
    description: "Mojo never had a Python-style `str()` builtin. Calls like `str(x)` are a common port-from-Python mistake; the compiler reports them as unknown declarations."
    fix: "Replace `str(x)` with `String(x)`. For numbers, `String(i)` works directly. For custom types, ensure the type conforms to `Writable` and call `String(x)`."
    link: null

  - id: copyable-movable-required
    title: "Type cannot be copied or moved — add Copyable/Movable"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "value of type '[^']+' cannot be copied or moved; consider conforming it to '(?:Copyable|Movable|ImplicitlyCopyable)'"
    timeout_pattern: false
    description: "Containers (List, Dict, Optional) and many stdlib APIs require their element types to be Copyable and Movable. Custom structs without explicit conformance can be stack-allocated locally but cannot be stored in collections or returned by value."
    fix: "Add the required traits to the struct definition: `struct Foo(Copyable, Movable):`. If the type owns non-copyable resources (file handles, unique pointers), implement `__copyinit__`/`__moveinit__` manually or wrap it in an `OwningPointer`."
    link: null

  - id: raw-pointer-needs-unsafe
    title: "Public function dereferencing raw pointer must be `unsafe`"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "this public function might dereference a raw pointer but is not marked `unsafe`"
    timeout_pattern: false
    description: "Public functions that may dereference an UnsafePointer must opt in to unsafe semantics. Mojo refuses to expose pointer-dereferencing APIs as safe-by-default."
    fix: "Mark the function `unsafe` (e.g. `unsafe def read_at(ptr: UnsafePointer[UInt8], i: Int) -> UInt8:`), make it `private` / module-local, or wrap the pointer access behind a safe abstraction that validates bounds before dereferencing."
    link: null

  # -- 2026-05-19 Mojo 1.0.0b1 idiom audit --
  # Sourced from dixi/docs/mojo-1.0.0b1-idioms.md (plan-17a/17b validated)
  # and spot-checked with `mcp__mojo-mcp__execute` against 1.0.0b1.

  - id: alias-deprecated
    title: "`alias` deprecated — use `comptime`"
    severity: warning
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "^\\s*alias\\s+\\w+\\s*="
    error_pattern: "'alias' is deprecated; use 'comptime'"
    timeout_pattern: false
    description: "Since Mojo 1.0.0b1, `alias FOO = ...` for compile-time bindings is deprecated in favor of `comptime FOO = ...`. The old form still compiles but emits a deprecation warning."
    fix: "Replace `alias FOO = ...` with `comptime FOO = ...`."
    link: null

  - id: del-var-self-hangs
    title: "`def __del__(var self)` hangs the 1.0.0b1 compiler — use `deinit self`"
    severity: critical
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "def\\s+__del__\\s*\\(\\s*var\\s+self"
    error_pattern: null
    timeout_pattern: true
    description: "In Mojo 1.0.0b1, `def __del__(var self):` causes the compiler to hang (observed >90s on a single-field struct) instead of producing a diagnostic. The destructor's self parameter must use the dedicated `deinit` keyword so the compiler can distinguish destruction-time semantics from a normal owning move."
    fix: "Replace `def __del__(var self):` with `def __del__(deinit self):`. No body changes needed."
    link: null

  - id: sizeof-renamed
    title: "`sizeof[T]()` renamed to `size_of[T]()`"
    severity: warning
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "\\bsizeof\\s*\\["
    error_pattern: "use of unknown declaration 'sizeof'"
    timeout_pattern: false
    description: "Since Mojo 1.0.0b1, the compile-time size helper is `size_of[T]()` (snake_case) from `std.sys.info`. The old `sizeof[T]()` produces an undefined-symbol error."
    fix: "Replace `sizeof[T]()` with `size_of[T]()` and add `from std.sys.info import size_of`."
    link: null

  - id: mutable-any-origin-renamed
    title: "`MutableAnyOrigin` renamed to `MutAnyOrigin`"
    severity: warning
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "\\bMutableAnyOrigin\\b"
    error_pattern: "use of unknown declaration 'MutableAnyOrigin'"
    timeout_pattern: false
    description: "Since Mojo 1.0.0b1, `MutableAnyOrigin` is renamed to `MutAnyOrigin` (no 'able'). Used in `ref [...]` annotations and `UnsafePointer[T, MutAnyOrigin]` declarations."
    fix: "Replace `MutableAnyOrigin` with `MutAnyOrigin`."
    link: null

  - id: unsafe-pointer-null-sentinel
    title: "`UnsafePointer[T]()` as null sentinel — wrap in Optional"
    severity: critical
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "UnsafePointer\\[[^\\]]+\\]\\s*\\(\\s*\\)"
    error_pattern: null
    timeout_pattern: false
    description: "Mojo 1.0.0b1 enforces a non-null UnsafePointer policy. Default-constructed `UnsafePointer[T]()` produces a null pointer that segfaults on dereference; the type system no longer treats this as a valid sentinel."
    fix: "Replace `var ptr = UnsafePointer[T]()` with `var ptr: Optional[UnsafePointer[T, MutAnyOrigin]] = None`. Guard dereferences with `if ptr: ... ptr.value()...`."
    link: null

  - id: equatable-eq-raises
    title: "Equatable `__eq__` declared `raises` falls back to reflection auto-derive"
    severity: warning
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "def\\s+__eq__\\s*\\([^)]*\\)\\s+raises\\s*->\\s*Bool"
    error_pattern: "could not derive Equatable for [^\\n]+member field [^\\n]*does not implement"
    timeout_pattern: false
    description: "If `__eq__` is declared `def __eq__(self, other: Self) raises -> Bool`, Mojo 1.0.0b1 silently rejects it as the Equatable conformance and falls back to reflection-based auto-derive. The auto-derive then fails with a misleading 'member field does not implement Equatable' error even when every field is Equatable — because the fallback walks the struct's fields and can fail on Variant arms or wrapper types."
    fix: "Make `__eq__` non-raising: `def __eq__(self, other: Self) -> Bool`. If equality needs to call raising accessors, add an internal `_unchecked_get(i) -> Value` helper (no bounds check, no raise) and use it in the structural walk."
    link: null

  - id: writer-bound-without-some
    title: "`write_to[W: Writer]` — prefer `Some[Writer]` sugar"
    severity: info
    mojo_versions: [">=1.0.0b1"]
    code_pattern: "def\\s+write_to\\s*\\[\\s*W\\s*:\\s*Writer\\s*\\]"
    error_pattern: null
    timeout_pattern: false
    description: "Both forms compile in Mojo 1.0.0b1, but `def write_to(self, mut writer: Some[Writer])` is the preferred existential-trait sugar. Avoids exposing the type parameter in the signature."
    fix: "Replace `def write_to[W: Writer](self, mut writer: W):` with `def write_to(self, mut writer: Some[Writer]):`."
    link: null

  # -- Security rules (adapted from ANSSI secure Mojo guide) --
  # Category: security — these patterns detect violations of secure
  # development practices per the "Programming Rules to Develop Secure
  # Applications with Mojo" guide.

  - id: sec-forget-deinit
    title: "Use of forget_deinit (M15)"
    severity: critical
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bforget_deinit\\s*\\("
    error_pattern: null
    timeout_pattern: false
    description: "forget_deinit skips destructors, which may leak critical resources or leave sensitive data in memory. Prohibited by secure development rule M15."
    fix: "Remove forget_deinit. Let values go out of scope naturally, or use @explicit_destroy for controlled consumption."
    link: null

  - id: sec-abort-in-library
    title: "abort() used outside main entry point (M13)"
    severity: warning
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\babort\\s*\\("
    error_pattern: null
    timeout_pattern: false
    description: "abort() terminates the process with no cleanup. Library code should use `raises` for recoverable errors. Prohibited in library code by rule M13."
    fix: "Replace abort() with `raise Error(...)`. Reserve abort() for truly unrecoverable states in application entry points only."
    link: null

  - id: sec-memset-zero-sensitive
    title: "memset_zero used for sensitive data (M20)"
    severity: warning
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bmemset_zero\\s*\\("
    error_pattern: null
    timeout_pattern: false
    description: "memset_zero may be optimized away by dead-store elimination. For sensitive data (keys, passwords, tokens), use volatile stores instead. Rule M20."
    fix: "Replace with a byte-wise volatile-store loop: `ptr.store[volatile=True](i, UInt8(0))`. See the secure zeroing pattern in the Mojo security guide."
    link: null

  - id: sec-unsafe-pointer-app-code
    title: "UnsafePointer in application code (M9)"
    severity: warning
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bUnsafePointer\\["
    error_pattern: null
    timeout_pattern: false
    description: "UnsafePointer should be confined to FFI boundary modules and low-level infrastructure. Application code should use OwnedPointer, ArcPointer, or Span instead. Rule M9."
    fix: "Replace with OwnedPointer (single owner), ArcPointer (shared), Pointer/Span (borrowing). Confine UnsafePointer to dedicated FFI/infrastructure modules."
    link: null

  - id: sec-unsafe-union
    title: "UnsafeUnion usage requires careful validation (M9/M30)"
    severity: warning
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bUnsafeUnion\\["
    error_pattern: null
    timeout_pattern: false
    description: "UnsafeUnion provides untagged C union semantics. Reading the wrong variant is undefined behavior. Must be confined to FFI modules and validated carefully. Rules M9, M30."
    fix: "Only access the variant that was last written. Validate discriminant values from foreign code. Document the safety invariants."
    link: null

  - id: sec-unsafe-maybe-uninit
    title: "UnsafeMaybeUninit usage (M19)"
    severity: warning
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bUnsafeMaybeUninit\\["
    error_pattern: null
    timeout_pattern: false
    description: "UnsafeMaybeUninit wraps potentially uninitialized memory. Its destructor is a no-op — initialized values will not be cleaned up. Must be explicitly justified. Rule M19."
    fix: "Avoid UnsafeMaybeUninit unless explicitly justified. Track initialization state manually and call unsafe_assume_init_destroy() on initialized values."
    link: null

  - id: sec-export-missing-try
    title: "@export function without try/except (M44)"
    severity: critical
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "@export\\s*\\([^)]*\\)\\s*\\ndef\\s+\\w+\\s*\\([^)]*\\)\\s*(?:raises\\s+)?->"
    error_pattern: null
    timeout_pattern: false
    description: "Functions exported via @export with ABI=\"C\" must catch all exceptions internally. Unhandled exceptions across FFI boundaries result in undefined behavior. Rule M44."
    fix: "Wrap the function body in try/except, convert exceptions to C-compatible error return codes. Never let `raises` propagate from an @export function."
    link: null

  - id: sec-safe-ref-at-ffi
    title: "Safe Pointer/ref used at FFI boundary (M34)"
    severity: warning
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "@export\\s*\\([^)]*\\)[\\s\\S]*?\\bPointer\\["
    error_pattern: null
    timeout_pattern: false
    description: "Safe Pointer types with origin tracking should not be used at FFI boundaries. Foreign code cannot satisfy Mojo's reference validity requirements. Use UnsafePointer instead. Rule M34."
    fix: "Replace Pointer[T] with UnsafePointer[T, MutAnyOrigin] in @export function signatures."
    link: null

  - id: sec-ffi-fn-pointer-no-abi
