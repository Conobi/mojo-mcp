version: "0.26.2"

gotchas:
  - id: variant-loop-hang
    title: "Variant in loop causes extreme compile slowdown"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: "for\\s+.+\\n[\\s\\S]*?Variant"
    error_pattern: null
    timeout_pattern: true
    description: "Using Variant inside a for loop causes the compiler to hang or take extremely long. Use struct-of-arrays dispatch instead."
    fix: "Replace Variant dispatch in loops with a tag enum + separate arrays per type."
    link: null

  - id: no-module-level-mutable
    title: "No module-level mutable variables"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "^var\\s+\\w+"
    error_pattern: "module-level variable .+ must be declared as"
    timeout_pattern: false
    description: "Mojo does not support mutable module-level variables."
    fix: "Use `alias` for compile-time constants, or wrap in a struct with `__init__`."
    link: null

  - id: string-indexing
    title: "String indexing unsupported"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\w+\\[\\d+\\]"
    error_pattern: "does not implement .+__getitem__"
    timeout_pattern: false
    description: "String indexing with [] is not supported in Mojo. Use .as_bytes() to access individual characters."
    fix: "Replace `s[i]` with `s.as_bytes()[i]`."
    link: null

  - id: variant-reference-not-copy
    title: "Variant returns references, not copies"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bget\\[.+\\]\\(\\)"
    error_pattern: null
    timeout_pattern: false
    description: "Variant.get[T]() returns a reference, not a copy. Using the value after the Variant is modified leads to undefined behavior."
    fix: "Use `.copy()` immediately after `.get[T]()` for owned binds."
    link: null

  - id: inline-array-init
    title: "InlineArray requires all N slots initialized"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "InlineArray\\["
    error_pattern: "must be initialized"
    timeout_pattern: false
    description: "InlineArray[T, N] requires all N slots to be initialized at construction. Partial initialization is not allowed."
    fix: "Initialize all slots explicitly, or use a factory function that fills all N values."
    link: null

  - id: no-match-enum
    title: "No match/enum support"
    severity: info
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bmatch\\s+"
    error_pattern: "unexpected token 'match'"
    timeout_pattern: false
    description: "Mojo does not have match/enum support yet (deferred beyond 1.0). Use if/elif chains or Variant."
    fix: "Use if/elif chains with isa[] checks, or a struct-based tag dispatch pattern."
    link: null

  - id: dtypepointer-deprecated
    title: "DTypePointer deprecated in favor of UnsafePointer"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "\\bDTypePointer\\b"
    error_pattern: "DTypePointer.+deprecated"
    timeout_pattern: false
    description: "DTypePointer is deprecated since Mojo 25.4. Use UnsafePointer instead."
    fix: "Replace `DTypePointer[dtype]` with `UnsafePointer[Scalar[dtype]]`."
    link: null

  - id: slow-compilation-hint
    title: "Large file may cause slow compilation"
    severity: info
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: null
    timeout_pattern: true
    description: "Mojo compilation can take 60-90s for complex files. Consider precompiling stable code into .mojopkg."
    fix: "Split stable code into a package: `mojo package mylib/ -o mylib.mojopkg`, then import it."
    link: null

  - id: moveinit-copyinit-renamed
    title: "__moveinit__ and __copyinit__ renamed to __init__ with keyword args"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "\\bdef __(?:moveinit|copyinit)__\\b"
    error_pattern: null
    timeout_pattern: false
    description: "Since Mojo 0.26.2, __moveinit__() and __copyinit__() are renamed to __init__() with keyword-only `take` and `copy` arguments respectively. The legacy names still work but should be migrated."
    fix: "Replace `def __moveinit__(out self, *, take existing: Self)` with `def __init__(out self, *, take: Self)`. Replace `def __copyinit__(out self, *, copy existing: Self)` with `def __init__(out self, *, copy: Self)`."
    link: null

  - id: for-loop-reference
    title: "For loop variable is a reference, not a copy"
    severity: warning
    mojo_versions: [">=0.26.0"]
    code_pattern: "for\\s+\\w+\\s+in\\s+"
    error_pattern: null
    timeout_pattern: false
    description: "In Mojo, `for x in collection` binds x as a reference. Modifying the collection during iteration is undefined behavior."
    fix: "If you need to modify elements, use index-based iteration. If you need a copy, explicitly copy: `var local = x[].copy()`."
    link: null

  - id: integer-overflow-ub
    title: "Integer overflow is undefined behavior"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: null
    error_pattern: "integer overflow"
    timeout_pattern: false
    description: "Mojo integer overflow is undefined behavior with no runtime check by default. This can cause silent corruption."
    fix: "Use checked arithmetic or enable overflow checks with `-D ASSERT=all` during development."
    link: null

  - id: fn-deprecated
    title: "'fn' is deprecated — use 'def' instead"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "^fn\\s+"
    error_pattern: "deprecated.*\\bfn\\b"
    timeout_pattern: false
    description: "Since Mojo 0.26.2, `def` is the standard function declaration keyword. `fn` is deprecated and will be removed. `def` now has the same semantics as `fn` (non-raising by default, explicit `raises` required)."
    fix: "Replace `fn` with `def`. Add `raises` explicitly if the function can raise."
    link: null

  - id: owned-keyword-removed
    title: "'owned' keyword has been removed"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: "\\bowned\\s+\\w+"
    error_pattern: "owned"
    timeout_pattern: false
    description: "The `owned` keyword has been removed in Mojo 0.26.2. Use `var` for parameters or `deinit` for __moveinit__/__del__ arguments."
    fix: "Replace `owned` with `var` (for general parameters) or `deinit` (for move/destroy arguments)."
    link: null

  - id: stringable-deprecated
    title: "Stringable and Representable deprecated — use Writable"
    severity: info
    mojo_versions: [">=0.26.2"]
    code_pattern: "\\b(?:Stringable|Representable)\\b"
    error_pattern: "(?:Stringable|Representable).+deprecated"
    timeout_pattern: false
    description: "Stringable and Representable traits are deprecated in Mojo 0.26.2. They are replaced by the unified Writable trait, which provides default implementations."
    fix: "Replace `Stringable` and `Representable` conformances with `Writable`."
    link: null

  - id: parameter-if-deprecated
    title: "@parameter if/for deprecated — use comptime if/for"
    severity: info
    mojo_versions: [">=0.26.2"]
    code_pattern: "@parameter\\s*\\n\\s*(?:if|for)\\s+"
    error_pattern: null
    timeout_pattern: false
    description: "The `@parameter if` and `@parameter for` syntax is deprecated in Mojo 0.26.2. Use `comptime if` and `comptime for` instead."
    fix: "Replace `@parameter\\nif condition:` with `comptime if condition:`. Replace `@parameter\\nfor i in range(N):` with `comptime for i in range(N):`."
    link: null

  - id: emoji-extension-removed
    title: ".🔥 and 📦 file extensions no longer supported"
    severity: warning
    mojo_versions: [">=0.26.2"]
    code_pattern: null
    error_pattern: "emoji.*extension|🔥|📦"
    timeout_pattern: false
    description: "The .🔥 (flame) and 📦 (package) emoji file extensions are no longer supported in Mojo 0.26.2. Use .mojo for source files and __init__.mojo for packages."
    fix: "Rename .🔥 files to .mojo and 📦 files to __init__.mojo."
    link: null

  - id: parallelize-heap-serializes
    title: "parallelize() serializes when work functions do heap allocation"
    severity: critical
    mojo_versions: [">=0.26.0"]
    code_pattern: "parallelize\\[.*\\]\\(.*\\)"
    error_pattern: null
    timeout_pattern: false
    description: "parallelize() achieves real multi-core speedup (3-4x) for compute-only closures, but shows 99% single-core usage when the work function does heap allocation (alloc, List append, struct construction). The Mojo runtime's memory allocator likely holds a global lock that serializes threads. Mojo's concurrency model is still in development — parallelize is 'not really a safe construct' for general-purpose concurrent code."
    fix: "For compute-only work (SIMD, math, reading from pre-allocated buffers): parallelize works well. For work that allocates memory: pre-allocate ALL memory before the parallel phase, or use os.process.Process for process-level isolation (each process gets its own allocator). Avoid allocating, cloning, or constructing structs inside @parameter closures passed to parallelize."
    link: "https://github.com/modular/modular/issues/1660"
