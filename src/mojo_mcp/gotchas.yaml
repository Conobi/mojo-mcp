  - id: sec-implicit-copy-sensitive
    title: "ImplicitlyCopyable on potentially sensitive type (M29)"
    severity: info
    category: security
    mojo_versions: [">=0.26.0"]
    code_pattern: "struct\\s+\\w*(?:Key|Secret|Token|Password|Credential|Private)\\w*\\s*\\([^)]*ImplicitlyCopyable"
    error_pattern: null
    timeout_pattern: false
    description: "Types wrapping sensitive data (keys, secrets, tokens) should not be ImplicitlyCopyable. Accidental copies leave sensitive data in multiple memory locations. Rule M29."
    fix: "Remove ImplicitlyCopyable. Use Copyable (requires explicit .copy() call) or make the type Movable only."
    link: null
